name: Beddepth
options:
  bundleIdPrefix: com.shimondeitel.beddepth
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Beddepth:
    type: application
    platform: iOS
    sources:
      - path: Beddepth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.beddepth
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Beddepth/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BeddepthTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BeddepthTests
      - path: Beddepth.storekit
    dependencies:
      - target: Beddepth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.beddepth.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BeddepthUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BeddepthUITests
    dependencies:
      - target: Beddepth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.beddepth.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Beddepth:
    build:
      targets:
        Beddepth: all
        BeddepthTests: [test]
        BeddepthUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Beddepth.storekit
    test:
      config: Debug
      storeKitConfiguration: Beddepth.storekit
      targets:
        - BeddepthTests
        - BeddepthUITests
    archive:
      config: Release
